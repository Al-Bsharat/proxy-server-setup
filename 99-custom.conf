# File descriptors
fs.file-max = 2097152

# Outbound ephemeral ports.
# Keep the start above 4096 so Linux has a clean service-port gap.
net.ipv4.ip_local_port_range = 10000 65535

# If your proxy listens on any ports inside the ephemeral range above, reserve
# them explicitly so the kernel never auto-allocates them for outbound sockets.
# Example:
# net.ipv4.ip_local_reserved_ports = 25000,30000-30100

# Congestion control and qdisc for TCP pacing on Linux.
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# TCP Fast Open support.
net.ipv4.tcp_fastopen = 3

# Listen and ingress queue sizing.
net.core.somaxconn = 65535
net.core.netdev_max_backlog = 50000
net.core.netdev_budget = 600
net.core.netdev_budget_usecs = 8000

# Do not shrink optmem below the kernel default on busy hosts.
net.core.optmem_max = 131072

# Allow autotuning to grow buffers high under load, but do not force huge
# global defaults on every socket.
net.ipv4.tcp_rmem = 4096 87380 33554432
net.ipv4.tcp_wmem = 4096 65536 33554432
net.core.rmem_max = 33554432
net.core.wmem_max = 33554432

# SYN and orphan handling.
net.ipv4.tcp_max_syn_backlog = 65536
net.ipv4.tcp_max_orphans = 262144
net.ipv4.tcp_window_scaling = 1
net.ipv4.tcp_slow_start_after_idle = 0

# Source validation and noisy/bad redirect protection.
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0

# SYN cookies are a fallback, not a throughput feature, but should stay on.
net.ipv4.tcp_syncookies = 1

# Keepalive tuning for stale connection cleanup.
net.ipv4.tcp_keepalive_time = 60
net.ipv4.tcp_keepalive_probes = 5
net.ipv4.tcp_keepalive_intvl = 15

# TIME_WAIT reuse depends on TCP timestamps. Keep timestamps enabled.
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_timestamps = 1

# Network hygiene.
# Enable only if this host also forwards packets at L3/NAT. It is not needed
# for a normal application-level HTTP/HTTPS/SOCKS proxy.
net.ipv4.ip_forward = 1
net.ipv4.icmp_echo_ignore_broadcasts = 1

# --- Disable Ping ---
net.ipv6.icmp.echo_ignore_all = 1
net.ipv4.icmp_echo_ignore_all = 1
