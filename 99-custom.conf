# =============================================================================
# Riptide Proxy Server — Kernel Network Tuning
# =============================================================================

# --- File Descriptors ---
fs.file-max = 4000000
fs.nr_open = 4000000

# --- Ephemeral Port Range ---
net.ipv4.ip_local_port_range = 1024 65535

# --- Congestion Control (BBR) ---
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# --- TCP Fast Open ---
net.ipv4.tcp_fastopen = 3

# --- Connection Backlog ---
net.core.somaxconn = 65535
net.core.netdev_max_backlog = 65536
net.core.optmem_max = 65536
net.ipv4.tcp_max_syn_backlog = 65536

# --- Processor Input Queue ---
net.core.netdev_budget = 600
net.core.netdev_budget_usecs = 8000

# --- TCP Memory ---
net.ipv4.tcp_mem = 131072 262144 524288
net.ipv4.udp_mem = 131072 262144 524288

# --- TCP Buffer Sizes ---
# Max 4MB per socket (not 33MB). At 300K connections, 33MB max causes kernel
# auto-tuner to over-allocate. 4MB is plenty for proxy forwarding 16KB chunks.
net.ipv4.tcp_rmem = 4096 87380 4194304
net.ipv4.tcp_wmem = 4096 65536 4194304
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.core.rmem_default = 1048576
net.core.wmem_default = 1048576

# --- Orphan Sockets ---
net.ipv4.tcp_max_orphans = 262144

# --- Window Scaling ---
net.ipv4.tcp_window_scaling = 1

# --- Source Routing (disabled for security) ---
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# --- Reverse Path Filtering ---
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# --- Log Martians ---
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# --- ICMP Redirects (disabled for security) ---
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.secure_redirects = 0

# --- SYN Cookies ---
net.ipv4.tcp_syncookies = 1

# --- TCP Keepalive ---
net.ipv4.tcp_keepalive_time = 60
net.ipv4.tcp_keepalive_probes = 5
net.ipv4.tcp_keepalive_intvl = 15

# --- TIME_WAIT Handling ---
# CRITICAL: tcp_tw_reuse REQUIRES tcp_timestamps=1 to work. Without timestamps,
# the kernel silently ignores tcp_tw_reuse and TIME_WAIT sockets are never reused.
net.ipv4.tcp_max_tw_buckets = 2000000
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_fin_timeout = 15
net.ipv4.tcp_timestamps = 1

# --- TIME_WAIT Assassination Protection (RFC 1337) ---
net.ipv4.tcp_rfc1337 = 1

# --- TCP SYN Retries ---
net.ipv4.tcp_syn_retries = 2
net.ipv4.tcp_synack_retries = 2

# --- Performance ---
# Disable slow start on idle connections (keeps cwnd for reused connections)
net.ipv4.tcp_slow_start_after_idle = 0
# Don't cache TCP metrics per destination (proxy hits millions of targets)
net.ipv4.tcp_no_metrics_save = 1
# Enable Path MTU Discovery to avoid fragmentation on tunneled connections
net.ipv4.tcp_mtu_probing = 1

# --- IP Forwarding ---
net.ipv4.ip_forward = 1

# --- Anti-Smurf ---
net.ipv4.icmp_echo_ignore_broadcasts = 1

# --- Disable Ping ---
net.ipv6.icmp.echo_ignore_all = 1
net.ipv4.icmp_echo_ignore_all = 1
